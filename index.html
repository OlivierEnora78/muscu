<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#15243A">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.webmanifest">
<title>Muscu · KeepCool</title>
<style>
  :root{
    --chrome:#15243A; --chrome2:#1E3556; --bg:#EAEEF3; --card:#FFFFFF;
    --ink:#15243A; --muted:#64748B; --line:#D8E0EA;
    --blue:#2E6CA4; --green:#1F9D55; --amber:#E0791A; --amber-bg:#FCEEDD;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg);}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); font-size:16px; line-height:1.4; padding-bottom:64px;
    -webkit-font-smoothing:antialiased;}
  .wrap{max-width:560px; margin:0 auto;}

  /* ---- App bar ---- */
  header{position:sticky; top:0; z-index:20; background:var(--chrome);
    color:#fff; padding:calc(env(safe-area-inset-top) + 10px) 12px 10px;}
  .eyebrow{font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#8FA6C4; font-weight:700;}
  .title{font-size:19px; font-weight:800; letter-spacing:-.01em; margin:1px 0 10px;}
  .tabs{display:grid; grid-template-columns:repeat(5,1fr); gap:5px;}
  .tab{appearance:none; border:0; cursor:pointer; border-radius:10px; padding:8px 2px 7px;
    background:var(--chrome2); color:#AFC0D8; font-family:inherit; text-align:center;
    transition:background .15s,color .15s;}
  .tab b{display:block; font-size:13px; font-weight:800; letter-spacing:.03em;}
  .tab span{display:block; font-size:10px; margin-top:1px; opacity:.85;}
  .tab.active{background:#fff; color:var(--chrome);}
  .tab.active b{color:var(--chrome);}
  .tab:focus-visible{outline:2px solid #fff; outline-offset:2px;}

  .week{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:10px;}
  .wk-label{font-size:14px; font-weight:700; color:#DCE6F2;}
  .wk-label .sub{display:block; font-size:11px; font-weight:500; color:#8FA6C4; margin-top:1px;}
  .stepper{display:flex; align-items:center; gap:8px;}
  .stepper button{appearance:none; border:0; cursor:pointer; width:40px; height:40px; border-radius:10px;
    background:var(--chrome2); color:#fff; font-size:22px; line-height:1; font-family:inherit;}
  .stepper button:active{background:#0E1A2C;}
  .stepper button:disabled{opacity:.3;}
  .stepper button:focus-visible{outline:2px solid #fff; outline-offset:2px;}
  .tools{display:flex; gap:8px; margin-top:8px;}
  .tools button{flex:1; appearance:none; border:0; cursor:pointer; border-radius:10px; padding:8px 4px;
    background:var(--chrome2); color:#DCE6F2; font-family:inherit; font-size:12.5px; font-weight:700;}
  .tools button:active{background:#0E1A2C;}
  .btnrow{display:flex; align-items:center; gap:14px;}
  .vid-btn{margin-left:auto; margin-top:10px; color:#B3261E; font-size:13px; font-weight:700;
    text-decoration:none; padding:2px 0; white-space:nowrap;}
  .wk-num{min-width:96px; text-align:center; font-size:15px; font-weight:800; color:#fff;}

  /* ---- Content ---- */
  main{padding:12px;}
  .banner{display:flex; gap:8px; align-items:flex-start; background:var(--amber-bg);
    border:1px solid #F1D5B0; border-radius:12px; padding:10px 12px; margin-bottom:12px;
    font-size:13.5px; color:#7A4A12;}
  .banner b{color:var(--amber);}

  .card{background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:13px 13px 12px; margin-bottom:11px; border-left:4px solid var(--line);}
  .card.done{border-left-color:var(--green);}
  .card.reset{border-left-color:var(--amber);}
  .c-top{display:flex; justify-content:space-between; align-items:baseline; gap:10px;}
  .c-name{font-size:15.5px; font-weight:700; letter-spacing:-.01em;}
  .c-idx{color:var(--blue); font-weight:800;}
  .c-rest{flex:none; font-size:12px; color:var(--muted); font-weight:600; white-space:nowrap;}
  .c-rest svg{vertical-align:-2px; margin-right:2px;}

  .obj{display:flex; align-items:center; gap:10px; margin:9px 0 4px;}
  .obj .lab{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); font-weight:700;}
  .obj .val{font-size:26px; font-weight:800; letter-spacing:-.02em; font-variant-numeric:tabular-nums;}
  .pill{font-size:11px; font-weight:800; letter-spacing:.04em; text-transform:uppercase;
    color:#fff; background:var(--amber); border-radius:999px; padding:4px 9px; white-space:nowrap;}

  .sets{display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 2px;}
  .chip{appearance:none; border:1.5px solid var(--line); background:#F6F8FB; cursor:pointer;
    min-width:46px; height:44px; padding:0 8px; border-radius:11px; font-family:inherit;
    font-size:15px; font-weight:800; color:var(--ink); font-variant-numeric:tabular-nums;
    display:flex; align-items:center; justify-content:center; transition:all .12s;}
  .chip.on{background:var(--green); border-color:var(--green); color:#fff;}
  .chip:focus-visible{outline:2px solid var(--blue); outline-offset:2px;}

  .charge{display:flex; align-items:center; gap:10px; margin-top:11px;}
  .charge label{font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:700;}
  .charge input{flex:1; min-width:0; height:44px; border:1.5px solid var(--line); border-radius:11px;
    padding:0 12px; font-size:16px; font-weight:700; color:var(--ink); font-family:inherit; background:#fff;}
  .charge input::placeholder{color:#A9B6C6; font-weight:600;}
  .charge input:focus{outline:none; border-color:var(--blue);}
  .charge input.amber::placeholder{color:var(--amber);}

  .tech-btn{appearance:none; background:none; border:0; cursor:pointer; margin-top:10px; padding:2px 0;
    color:var(--blue); font-family:inherit; font-size:13px; font-weight:700; display:flex; align-items:center; gap:5px;}
  .tech-btn .car{transition:transform .15s;}
  .tech-btn.open .car{transform:rotate(90deg);}
  .tech{font-size:13.5px; color:#475569; margin-top:7px; padding:9px 11px; background:#F4F7FA;
    border-radius:10px; display:none;}
  .tech.open{display:block;}

  /* ---- Status bar ---- */
  .status{position:fixed; left:0; right:0; bottom:0; z-index:20;
    background:var(--chrome); color:#fff; padding:11px 14px calc(env(safe-area-inset-bottom) + 11px);
    font-size:13px; transition:background .2s;}
  .status .defaultbox{display:flex; justify-content:space-between; align-items:center; width:100%;}
  .status .prog{font-weight:800;}
  .status .bar{flex:1; height:6px; background:#28415F; border-radius:99px; margin:0 12px; overflow:hidden;}
  .status .bar i{display:block; height:100%; background:var(--green); width:0; transition:width .25s;}
  .status .wk{color:#8FA6C4; font-weight:700; white-space:nowrap;}
  .status .timerbox{display:none; align-items:center; gap:10px; width:100%;}
  .status.timing{background:var(--green);}
  .status.timing .defaultbox{display:none;}
  .status.timing .timerbox{display:flex;}
  .t-label{font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:36%;}
  .t-time{font-size:24px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.01em;}
  .t-bar{flex:1; height:6px; background:rgba(255,255,255,.28); border-radius:99px; overflow:hidden;}
  .t-bar i{display:block; height:100%; background:#fff; width:100%;}
  .t-cancel{appearance:none; border:0; width:38px; height:38px; border-radius:10px;
    background:rgba(0,0,0,.25); color:#fff; font-size:20px; line-height:1; cursor:pointer; font-family:inherit;}

  .loader{padding:60px 20px; text-align:center; color:var(--muted);}

  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Programme reprise · 26 semaines</div>
    <div class="title" id="dayTitle">Séance</div>
    <div class="tabs" id="tabs"></div>
    <div class="week">
      <div class="wk-label" id="daySub"><span class="sub"></span></div>
      <div class="stepper">
        <button id="prev" aria-label="Semaine précédente">‹</button>
        <div class="wk-num" id="wkNum">Sem. 1</div>
        <button id="next" aria-label="Semaine suivante">›</button>
      </div>
    </div>
    <div class="tools">
      <button id="btnExport">💾 Sauvegarder</button>
      <button id="btnImport">📥 Restaurer</button>
      <input type="file" id="fileImport" accept=".json,application/json" hidden>
    </div>
  </header>
  <main id="list"><div class="loader">Chargement…</div></main>
</div>
<div class="status" id="status">
  <div class="defaultbox">
    <span class="prog" id="prog">0/0</span>
    <span class="bar"><i id="progbar"></i></span>
    <span class="wk" id="statusWk">Semaine 1 / 26</span>
  </div>
  <div class="timerbox">
    <span class="t-label" id="tLabel">Repos</span>
    <span class="t-time" id="tTime">0:00</span>
    <span class="t-bar"><i id="tBarI"></i></span>
    <button class="t-cancel" id="tCancel" aria-label="Arrêter le repos">×</button>
  </div>
</div>

ue": {"n": "Extension triceps nuque (poulie/haltère)", "r": "1'30", "cb": true, "t": "Coude haut et fixe, déploie complètement."}, "J5|pushdown": {"n": "Extension triceps poulie (pushdown)", "r": "1'30", "cb": true, "t": "Coudes collés au corps, déploie complètement."}, "J5|crunch": {"n": "Crunch", "r": "30\"", "cb": false, "t": "Idem séance 1, lesté en fin de programme."}, "J5|enroulement": {"n": "Enroulement de bassin", "r": "30\"", "cb": false, "t": "Idem séance 1."}, "SAM|liss": {"n": "Cardio LISS — vélo / marche rapide / elliptique", "r": "—", "cb": false, "t": "Zone 2 : allure où tu peux tenir une conversation. Brûle le gras sans entamer la récup. 30 min semaines 1-4, 40 min jusqu'à S12, 45 min ensuite."}, "SAM|vacuum": {"n": "Stomach vacuum (aspiration du ventre)", "r": "30\"", "cb": false, "t": "Expire à fond, rentre le nombril vers la colonne, tiens 15 secondes. Transverse = taille plus serrée."}};
const DAYS = {"J1": {"tab": "LUN", "mini": "Dos larg.", "sub": "Dos largeur · Épaules · Abdos", "ex": ["J1|tirage_vertical", "J1|rowing_1bras", "J1|rowing_pbasse", "J1|souleve_terre", "J1|rowing_debout", "J1|elevation_lat", "J1|facepull", "J1|crunch", "J1|enroulement"]}, "J2": {"tab": "MAR", "mini": "Pecs", "sub": "Pecs · Biceps · Gainage", "ex": ["J2|dc", "J2|dc_incline", "J2|ecarte", "J2|oiseau", "J2|curl_incline", "J2|curl_pupitre", "J2|gainage", "J2|gainage_obl"]}, "J4": {"tab": "JEU", "mini": "Jambes", "sub": "Jambes complètes", "ex": ["J4|squat", "J4|leg_curl", "J4|fentes", "J4|sdt_roumain", "J4|mollets", "J4|lombaires"]}, "J5": {"tab": "VEN", "mini": "Dos ép.", "sub": "Dos épaisseur · Triceps · Abdos", "ex": ["J5|traction", "J5|rowing_assis", "J5|rowing_yates", "J5|pullover", "J5|dips", "J5|ext_nuque", "J5|pushdown", "J5|crunch", "J5|enroulement"]}, "SAM": {"tab": "SAM", "mini": "Cardio", "sub": "Cardio LISS · Gainage profond", "ex": ["SAM|liss", "SAM|vacuum"]}};
const RESETS = {"J1|tirage_vertical": [6, 11, 16, 25], "J1|rowing_1bras": [7, 13, 19, 25], "J1|rowing_pbasse": [5, 12, 20], "J1|souleve_terre": [5, 9, 12, 17, 20, 23, 26], "J1|rowing_debout": [8, 14, 20, 26], "J1|elevation_lat": [9, 17, 25], "J2|dc": [6, 12, 17, 20, 25], "J2|dc_incline": [6, 14, 20], "J2|ecarte": [7, 13, 19, 25], "J2|oiseau": [12, 20], "J2|curl_incline": [12, 23], "J2|curl_pupitre": [11, 22], "J4|squat": [2, 8, 11, 18, 23, 26], "J4|leg_curl": [8, 14, 21], "J4|fentes": [7, 14, 21], "J4|sdt_roumain": [7, 11, 16, 22, 25], "J4|mollets": [2, 9, 15, 22], "J5|rowing_assis": [8, 15, 22], "J5|rowing_yates": [3, 10, 14, 20, 24], "J5|dips": [9, 15, 22], "J5|ext_nuque": [9, 15, 22], "J5|pushdown": [3, 11, 18, 24]};
const STORE_KEY = "keepcool_prog_v1";

let state = {};      // "<week>|<exoKey>" -> {c:"", s:[bool,...]}
let day = "J1";
let week = 1;
let saveTimer = null;

// ---------- stockage : window.storage (dans Claude) sinon localStorage (navigateur / écran d'accueil) ----------
const Store = {
  get(k){
    if(typeof window!=="undefined" && window.storage && window.storage.get) return window.storage.get(k);
    return Promise.resolve((()=>{ try{ const v=localStorage.getItem(k); return v?{key:k,value:v}:null; }catch(e){ return null; } })());
  },
  set(k,v){
    if(typeof window!=="undefined" && window.storage && window.storage.set) return window.storage.set(k,v);
    return Promise.resolve((()=>{ try{ localStorage.setItem(k,v); }catch(e){} })());
  }
};

// ---------- persistance ----------
async function loadState(){
  try{ const r = await Store.get(STORE_KEY); if(r && r.value) state = JSON.parse(r.value); }
  catch(e){ state = {}; }
}
function queueSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{ try{ await Store.set(STORE_KEY, JSON.stringify(state)); }catch(e){} }, 400);
}
function row(exoKey){
  const k = week+"|"+exoKey;
  if(!state[k]) state[k] = {c:"", s:[]};
  return state[k];
}

// ---------- helpers ----------
function parseSets(v){
  if(!v || v==="—") return {n:0,label:""};
  const m = v.match(/^(\d+)×(.+)$/);
  if(m) return {n:parseInt(m[1],10), label:m[2].trim()};
  return {n:1, label:v};          // bloc unique (ex "3'non-stop")
}
function lastCharge(exoKey){
  for(let w=week-1; w>=1; w--){ const r=state[w+"|"+exoKey]; if(r && r.c) return r.c; }
  return "";
}
function isReset(exoKey){ return (RESETS[exoKey]||[]).includes(week); }

const REST_ICON = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>';

// ---------- rendu ----------
function render(){
  state._ui = {d:day, w:week}; queueSave();
  // tabs
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  for(const d of Object.keys(DAYS)){
    const b = document.createElement("button");
    b.className = "tab"+(d===day?" active":"");
    b.innerHTML = "<b>"+DAYS[d].tab+"</b><span>"+DAYS[d].mini+"</span>";
    b.onclick = ()=>{ day=d; render(); window.scrollTo(0,0); };
    tabsEl.appendChild(b);
  }
  document.getElementById("dayTitle").textContent = DAYS[day].sub;
  document.getElementById("daySub").innerHTML = '<span class="sub">Séance '+({J1:1,J2:2,J4:3,J5:4,SAM:5})[day]+' / 5 · '+DAYS[day].tab.toLowerCase()+'</span>';
  document.getElementById("wkNum").textContent = "Sem. "+week;
  document.getElementById("statusWk").textContent = "Semaine "+week+" / 26";
  document.getElementById("prev").disabled = week<=1;
  document.getElementById("next").disabled = week>=26;

  const list = document.getElementById("list");
  list.innerHTML = "";

  // banner semaine de progression
  const resetEx = DAYS[day].ex.filter(k=>{ const v=DATA[k] && DATA[k][week]; return v && v!=="—" && isReset(k); });
  if(resetEx.length){
    const bn = document.createElement("div");
    bn.className = "banner";
    bn.innerHTML = '<span>↑</span><div><b>Semaine de progression.</b> Sur les exercices marqués <b>↑ monte d\'un cran</b>, augmente la charge et repars en bas de fourchette de reps.</div>';
    list.appendChild(bn);
  }

  let total=0, doneCount=0;

  DAYS[day].ex.forEach((exoKey, i)=>{
    const v = DATA[exoKey] && DATA[exoKey][week];
    if(!v || v==="—") return;                 // exo non programmé cette semaine
    const meta = EX[exoKey];
    const ps = parseSets(v);
    const r = row(exoKey);
    if(r.s.length !== ps.n) r.s = new Array(ps.n).fill(false).map((x,idx)=> r.s[idx]||false);
    const allDone = ps.n>0 && r.s.every(Boolean);
    total++; if(allDone) doneCount++;
    const reset = meta.cb && isReset(exoKey);

    const card = document.createElement("div");
    card.className = "card"+(allDone?" done":"")+(reset&&!allDone?" reset":"");

    // top
    const top = document.createElement("div"); top.className="c-top";
    top.innerHTML = '<div class="c-name"><span class="c-idx">'+(i+1)+'.</span> '+meta.n+'</div>'+
                    '<div class="c-rest">'+REST_ICON+meta.r+'</div>';
    card.appendChild(top);

    // objectif
    const obj = document.createElement("div"); obj.className="obj";
    obj.innerHTML = '<span class="lab">Objectif</span><span class="val">'+v.replace("×"," × ")+'</span>'+
                    (reset?'<span class="pill">↑ monte d\'un cran</span>':'');
    card.appendChild(obj);

    // séries (chips)
    if(ps.n>0){
      const sets = document.createElement("div"); sets.className="sets";
      for(let s=0; s<ps.n; s++){
        const chip = document.createElement("button");
        chip.className = "chip"+(r.s[s]?" on":"");
        chip.textContent = ps.label;
        chip.setAttribute("aria-pressed", r.s[s]?"true":"false");
        chip.onclick = ()=>{ r.s[s]=!r.s[s]; if(!r.c){ const lc=lastCharge(exoKey); if(lc) r.c=lc; } queueSave();
          if(r.s[s]){ startTimer(restSeconds(meta.r), meta.n); } else { stopTimer(); }
          render(); };
        sets.appendChild(chip);
      }
      card.appendChild(sets);
    }

    // charge
    const ch = document.createElement("div"); ch.className="charge";
    const inp = document.createElement("input");
    inp.type="text"; inp.inputMode="decimal"; inp.value = r.c || "";
    if(!r.c){ const lc=lastCharge(exoKey);
      inp.placeholder = reset ? "↑ monte d'un cran" : (lc ? lc+" (sem. préc.)" : "kg / n° cran");
      if(reset) inp.className="amber";
    }
    inp.onchange = ()=>{ r.c = inp.value.trim(); queueSave(); };
    inp.oninput  = ()=>{ r.c = inp.value.trim(); queueSave(); };
    ch.innerHTML = '<label>Charge</label>';
    ch.appendChild(inp);
    card.appendChild(ch);

    // technique repliable + vidéo
    const tbtn = document.createElement("button"); tbtn.className="tech-btn";
    tbtn.innerHTML = '<span class="car">▸</span> Exécution';
    const tech = document.createElement("div"); tech.className="tech"; tech.textContent = meta.t;
    tbtn.onclick = ()=>{ tech.classList.toggle("open"); tbtn.classList.toggle("open"); };
    const brow = document.createElement("div"); brow.className="btnrow";
    brow.appendChild(tbtn);
    if(exoKey!=="SAM|liss"){
      const vb=document.createElement("a"); vb.className="vid-btn";
      vb.textContent="▶ Vidéo technique"; vb.target="_blank"; vb.rel="noopener";
      vb.href="https://www.youtube.com/results?search_query="+encodeURIComponent(meta.n.split("(")[0].split("—")[0].trim()+" technique musculation");
      brow.appendChild(vb);
    }
    card.appendChild(brow); card.appendChild(tech);

    list.appendChild(card);
  });

  // statut
  document.getElementById("prog").textContent = doneCount+"/"+total+" exos";
  document.getElementById("progbar").style.width = total? (doneCount/total*100)+"%" : "0%";
}

document.getElementById("prev").onclick = ()=>{ if(week>1){week--; render(); window.scrollTo(0,0);} };
document.getElementById("next").onclick = ()=>{ if(week<26){week++; render(); window.scrollTo(0,0);} };

// ---------- timer de repos ----------
let tmr={id:null,total:0,left:0};
let AC=null;
function beep(){
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const t=AC.currentTime;
    [0,0.28].forEach(off=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.connect(g); g.connect(AC.destination); o.frequency.value=880;
      g.gain.setValueAtTime(0.0001,t+off);
      g.gain.exponentialRampToValueAtTime(0.35,t+off+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.22);
      o.start(t+off); o.stop(t+off+0.25);
    });
  }catch(e){}
}
function restSeconds(rs){
  if(!rs) return 0;
  const secs=[]; let m;
  const reMin=/(\d+)\s*'(\d+)?/g;
  while((m=reMin.exec(rs))) secs.push(parseInt(m[1],10)*60+(m[2]?parseInt(m[2],10):0));
  const reSec=/(\d+)\s*"/g;
  while((m=reSec.exec(rs))) secs.push(parseInt(m[1],10));
  return secs.length ? Math.max(...secs) : 0;
}
function fmt(s){ return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function tick(){
  document.getElementById("tTime").textContent = fmt(tmr.left);
  document.getElementById("tBarI").style.width = (tmr.total? (tmr.left/tmr.total*100):0)+"%";
  if(tmr.left<=0){ finishTimer(); return; }
  tmr.left--;
}
function startTimer(sec,label){
  stopTimer();
  if(!sec) return;
  try{ AC = AC || new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  tmr.total=sec; tmr.left=sec;
  document.getElementById("tLabel").textContent = "Repos · "+label;
  document.getElementById("status").classList.add("timing");
  tick();
  tmr.id=setInterval(tick,1000);
}
function finishTimer(){
  if(tmr.id){ clearInterval(tmr.id); tmr.id=null; }
  document.getElementById("status").classList.remove("timing");
  if(navigator.vibrate){ try{ navigator.vibrate([250,120,250]); }catch(e){} }
  beep();
}
function stopTimer(){
  if(tmr.id){ clearInterval(tmr.id); tmr.id=null; }
  document.getElementById("status").classList.remove("timing");
}
document.getElementById("tCancel").onclick = stopTimer;

// ---------- sauvegarde / restauration fichier ----------
function exportData(){
  try{
    const blob = new Blob([JSON.stringify(state)], {type:"application/json"});
    const a = document.createElement("a");
    const d = new Date(), p = n=>String(n).padStart(2,"0");
    a.href = URL.createObjectURL(blob);
    a.download = "muscu_sauvegarde_"+d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
  }catch(e){ alert("Export impossible : "+e.message); }
}
function importData(file){
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const obj = JSON.parse(r.result);
      if(!obj || typeof obj !== "object" || Array.isArray(obj)) throw new Error("format");
      state = obj; queueSave(); render();
      alert("Sauvegarde restaurée ✔");
    }catch(e){ alert("Fichier invalide — restauration annulée, tes données actuelles sont intactes."); }
  };
  r.readAsText(file);
}
document.getElementById("btnExport").onclick = exportData;
document.getElementById("btnImport").onclick = ()=>document.getElementById("fileImport").click();
document.getElementById("fileImport").onchange = e=>{ if(e.target.files[0]) importData(e.target.files[0]); e.target.value=""; };

// ---------- démarrage : jour auto + reprise de la dernière position ----------
(async function init(){
  await loadState();
  const ui = state._ui || {};
  const autoMap = {1:"J1", 2:"J2", 4:"J4", 5:"J5", 6:"SAM"};
  day  = autoMap[new Date().getDay()] || ui.d || "J1";
  week = ui.w || 1;
  render();
})();

// ---------- service worker (mode appli installée : hors-ligne) ----------
if("serviceWorker" in navigator && /^https?:$/.test(location.protocol)){
  try{ navigator.serviceWorker.register("./sw.js"); }catch(e){}
}
</script>
